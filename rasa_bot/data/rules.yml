version: "3.1"

rules:
  - rule: Menyapa pengguna saat greeting
    steps:
      - intent: greet
      - action: utter_greet

  - rule: Mengucapkan selamat tinggal
    steps:
      - intent: goodbye
      - action: utter_goodbye

  - rule: Menjawab tantangan bot
    steps:
      - intent: bot_challenge
      - action: utter_iamabot

  - rule: Menjalankan aksi rekomendasi parfum saat intent cari_parfum
    steps:
      - intent: cari_parfum
      - action: action_rekomendasi_parfum

  - rule: Menjalankan aksi rekomendasi parfum saat intent tanya_bestseller
    steps:
      - intent: tanya_bestseller
      - action: action_rekomendasi_parfum

  - rule: Menjalankan aksi rekomendasi parfum saat intent tanya_ketahanan
    steps:
      - intent: tanya_ketahanan
      - action: action_rekomendasi_parfum

  - rule: Menjalankan aksi rekomendasi parfum saat intent tanya_kopi_vanilla
    steps:
      - intent: tanya_kopi_vanilla
      - action: action_rekomendasi_parfum

  - rule: Menjalankan aksi rekomendasi parfum saat intent konsultasi_parfum_user_history
    steps:
      - intent: konsultasi_parfum_user_history
      - action: action_rekomendasi_parfum

  - rule: Menjawab perbedaan edp edt
    steps:
      - intent: tanya_edp_edt
      - action: utter_tanya_edp_edt

  - rule: Menjawab tips tahan lama
    steps:
      - intent: tanya_tips_tahan_lama
      - action: utter_tanya_tips_tahan_lama

  - rule: Menjawab cara simpan
    steps:
      - intent: tanya_cara_simpan
      - action: utter_tanya_cara_simpan

  - rule: Menjawab tentang notes
    steps:
      - intent: tanya_tentang_notes
      - action: utter_tanya_tentang_notes

  - rule: Menjawab cara pilih parfum
    steps:
      - intent: tanya_pilih_parfum
      - action: utter_tanya_pilih_parfum

  - rule: Menjawab pertanyaan harga
    steps:
      - intent: tanya_harga
      - action: utter_tanya_harga

  - rule: Menjawab pertanyaan produk spesifik
    steps:
      - intent: tanya_produk_spesifik
      - action: utter_tanya_produk_spesifik

  - rule: Rekomendasi parfum berdasarkan acara
    steps:
      - intent: tanya_parfum_acara
      - action: utter_tanya_parfum_acara

  - rule: Rekomendasi parfum floral
    steps:
      - intent: tanya_parfum_floral
      - action: utter_tanya_parfum_floral

  - rule: Rekomendasi parfum fresh dan segar
    steps:
      - intent: tanya_parfum_fresh_segar
      - action: utter_tanya_parfum_fresh_segar

  - rule: Menjawab pengertian parfum
    steps:
      - intent: tanya_pengertian_parfum
      - action: utter_tanya_pengertian_parfum

  - rule: Menjawab manfaat parfum
    steps:
      - intent: tanya_manfaat_parfum
      - action: utter_tanya_manfaat_parfum

  - rule: Menjawab cara kerja parfum
    steps:
      - intent: tanya_cara_kerja_parfum
      - action: utter_tanya_cara_kerja_parfum

  - rule: Menjawab sejarah parfum
    steps:
      - intent: tanya_sejarah_parfum
